<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>E-Sukan Login</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body { 
                font-family: Arial, sans-serif; 
                background-color: #18392b; 
                min-height: 100vh; 
                display: flex;
                flex-direction: column;
                align-items: center;
                color: white;
                padding-bottom: 50px;
            }

            .header-section {
                width: 100%;
                padding: 40px 20px 20px 20px;
                text-align: center;
            }

            .header-section h1 {
                font-size: 3rem;
                font-weight: bold;
                letter-spacing: 4px;
                text-transform: uppercase;
                margin-bottom: 10px;
            }

            .header-section p {
                font-size: 1rem;
                color: #a3b899;
                opacity: 0.9;
            }

            .login-wrapper {
                flex: 1; 
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
            }

            .login-container { 
                width: 500px; 
                background: white; 
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
                color: #333; 
            }

            .role-radio-group {
                display: flex;
                justify-content: center;
                gap: 30px;
                margin-bottom: 25px;
                padding-bottom: 15px;
                border-bottom: 1px solid #eee;
            }

            .radio-label {
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
                font-size: 1.05rem;
                font-weight: bold;
                color: #444;
            }

            .radio-label input[type="radio"] {
                width: 18px;
                height: 18px;
                accent-color: #28a745; 
                cursor: pointer;
            }

            .form-group { 
                margin-bottom: 18px;
            }
            
            .form-group label {
                display: block; 
                margin-bottom: 7px;
                font-weight: bold;
                font-size: 0.85rem;
            }
            
            .form-group input { 
                width: 100%; 
                padding: 14px; 
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 0.95rem;
                background-color: #f9f9f9;
                height: 50px; 
                box-sizing: border-box; 
            }

            .form-group input:focus {
                border-color: #28a745;
                outline: none;
                background-color: #fff;
            }
            
            .btn { 
                background-color: #28a745; 
                color: white; 
                padding: 13px; 
                width: 100%; 
                border: none; 
                border-radius: 6px; 
                cursor: pointer;
                font-size: 1rem;
                font-weight: bold;
                margin-top: 15px;
                transition: background 0.3s;
                height: 50px;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .btn:hover { 
                background-color: #218838; 
            }
            
            .register-link {
                display: block;
                text-align: center;
                margin-top: 20px;
                color: #666;
                text-decoration: none;
                font-size: 0.9rem;
            }

            .register-link:hover {
                color: #18392b;
                text-decoration: underline;
            }

            @media (max-width: 540px) {
                .login-container {
                    width: 90%;
                    padding: 30px 20px;
                }
            }
        </style>
    </head>
    <body>
        
        <div class="header-section">
            <h1>E-SUKAN</h1>
            <p>Manage booking of court sport and rental of equipment</p>
        </div>
        
        <div class="login-wrapper">
            <div class="login-container">
                
                <form action="login" method="POST">
                    
                    <div class="role-radio-group">
                        <label class="radio-label">
                            <input type="radio" name="role" value="Manager" checked required>
                            Manager
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="role" value="Student" required>
                            Student
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address:</label>
                        <input type="email" name="email" placeholder="example@email.com" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label>Password:</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn">LOG IN</button>
                </form>

                <a href="register.html" class="register-link">Don't have an account? Register here</a>
            </div>
        </div>
        
    </body>
</html>
