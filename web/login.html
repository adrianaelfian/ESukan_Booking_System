<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>E-Sukan Login</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body { 
                font-family: Arial, sans-serif; 
                background-color: #18392b; /* Matches your dark green branding color */
                min-height: 100vh; 
                display: flex;
                flex-direction: column;
                align-items: center;
                color: white;
                padding-bottom: 50px;
            }

            /* Branding Header Section at the Top */
            .header-section {
                width: 100%;
                padding: 40px 20px 20px 20px;
                text-align: center;
            }

            .header-section h1 {
                font-size: 3rem;
                font-weight: bold;
                letter-spacing: 4px;
                text-transform: uppercase;
                margin-bottom: 10px;
            }

            .header-section p {
                font-size: 1rem;
                color: #a3b899;
                opacity: 0.9;
            }

            /* Wrapper to help vertical/horizontal alignment */
            .login-wrapper {
                flex: 1; 
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
            }

            /* White form container block sized at 500px */
            .login-container { 
                width: 500px; 
                background: white; 
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
                color: #333; 
            }

            .form-header {
                margin-bottom: 25px;
                text-align: center;
            }

            .form-header h2 {
                font-size: 1.6rem;
                color: #18392b;
                margin-bottom: 5px;
            }

            .form-header p {
                color: #666;
                font-size: 0.9rem;
            }

            .form-group { 
                margin-bottom: 18px;
            }
            
            .form-group label {
                display: block; 
                margin-bottom: 7px;
                font-weight: bold;
                font-size: 0.85rem;
            }
            
            /* Identical widths, heights, and padding behavior across inputs and dropdowns */
            .form-group input, .form-group select { 
                width: 100%; 
                padding: 14px; 
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 0.95rem;
                background-color: #f9f9f9;
                height: 50px; 
                box-sizing: border-box; 
            }

            .form-group input:focus, .form-group select:focus {
                border-color: #28a745;
                outline: none;
                background-color: #fff;
            }
            
            /* Green Submit Button */
            .btn { 
                background-color: #28a745; 
                color: white; 
                padding: 13px; 
                width: 100%; 
                border: none; 
                border-radius: 6px; 
                cursor: pointer;
                font-size: 1rem;
                font-weight: bold;
                margin-top: 10px;
                transition: background 0.3s;
                height: 50px;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .btn:hover { 
                background-color: #218838; 
            }
            
            .register-link {
                display: block;
                text-align: center;
                margin-top: 20px;
                color: #666;
                text-decoration: none;
                font-size: 0.9rem;
            }

            .register-link:hover {
                color: #18392b;
                text-decoration: underline;
            }

            @media (max-width: 540px) {
                .login-container {
                    width: 90%;
                    padding: 30px 20px;
                }
            }
        </style>
    </head>
    <body>
        
        <div class="header-section">
            <h1>E-SUKAN</h1>
            <p>Manage booking of court sport and rental of equipment</p>
        </div>
        
        <div class="login-wrapper">
            <div class="login-container">
                <div class="form-header">
                    <h2>Account Login</h2>
                    <p>Please enter your credentials to access your account</p>
                </div>
                
                <!-- Action points to dashboard.html for your storyboard flow -->
                <form action="dashboard.html" method="GET">
                    <div class="form-group">
                        <label>Email Address:</label>
                        <input type="email" name="email" placeholder="example@email.com" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label>Role:</label>
                        <select name="role" required>
                            <option value="" disabled selected>Select your identity</option>
                            <option value="STUDENT">Student</option>
                            <option value="MANAGER">Manager</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Password:</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn">Login</button>
                </form>

                <a href="register.html" class="register-link">Don't have an account? Register here</a>
            </div>
        </div>
        
    </body>
</html>
