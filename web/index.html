<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Welcome to E-Sukan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: Arial, sans-serif; 
            background-color: #18392b; /* Tema warna hijau tua anda */
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .welcome-container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1); /* Kotak lutsinar yang moden */
            padding: 50px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #a3b899;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            min-width: 160px;
            display: inline-block;
        }

        /* Butang Login Warna Hijau Terang */
        .btn-login {
            background-color: #28a745;
            color: white;
        }

        .btn-login:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        /* Butang Register Reka Bentuk Garisan Outlined */
        .btn-register {
            background-color: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-register:hover {
            background-color: white;
            color: #18392b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>E-SUKAN</h1>
        <p>Welcome to the E-Sukan Sports Facility & Equipment Management System. Reserve athletic courts and rent sports equipment seamlessly in one place.</p>
        
        <div class="btn-group">
            <a href="login.html" class="btn btn-login">Sign In</a>
            <a href="register.html" class="btn btn-register">Create Account</a>
        </div>
    </div>

</body>
</html>
