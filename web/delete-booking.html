<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cancel Booking - E-Sukan</title>
    <style>
        /* Reset default browser margins and padding */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: Arial, sans-serif; 
            background: #f5f5f5; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* TOP HEADER BANNER: Signature E-Sukan Dark Green */
        .header-banner {
            width: 100%;
            background: #18392b; 
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .header-banner h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .header-banner p {
            color: #a3b899;
            font-size: 0.95rem;
        }

        /* MAIN CONTENT AREA BELOW */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* White Dialog Box Container */
        .container { 
            width: 100%;
            max-width: 450px; 
            margin: auto; 
            background: white; 
            padding: 35px 25px 25px 25px; 
            border-radius: 10px; 
            text-align: center;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.05);
        }

        h2 { color: #18392b; font-size: 1.8rem; margin-bottom: 20px; }
        
        /* BULLETPROOF WARNING BOX (100% Pure CSS) */
        .warning-box {
            width: 60px;
            height: 60px;
            background-color: #fff3cd;
            border: 2px solid #ffecb5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }
        
        .warning-sign {
            color: #856404;
            font-size: 32px;
            font-weight: bold;
        }

        /* Booking Details Display Card */
        .booking-details { 
            background: #f9f9f9; 
            border: 1px solid #ddd; 
            padding: 15px; 
            border-radius: 5px; 
            margin: 20px 0; 
            text-align: left; 
            line-height: 1.5; 
        }

        /* Button Alignment Group */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        /* BRIGHT RED ACTION BUTTON */
        .btn-delete { 
            flex: 1;
            background: #dc3545; /* Clean, noticeable Bootstrap red */
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-delete:hover { 
            background: #bd2130; /* Darker red on hover */
        }
        
        /* NEUTRAL GO BACK BUTTON */
        .btn-cancel { 
            flex: 1;
            background: #6c757d; /* Slate grey */
            color: white; 
            padding: 12px 20px; 
            text-decoration: none; 
            border-radius: 6px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold; 
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-cancel:hover { 
            background: #5a6268; 
        }
        
        .btn-back { display: inline-block; margin-top: 25px; color: #666; text-decoration: none; font-size: 0.9rem; }
        .btn-back:hover { color: #18392b; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>REMOVE</h1>
        <p>Cancelling reservations releases inventory back to general availability instantly.</p>
    </div>

    <div class="main-content">
        <div class="container">
            <h2>Cancel Booking</h2>
            
            <div class="warning-box">
                <span class="warning-sign">!</span>
            </div>
            
            <p>Are you sure you want to cancel this booking?</p>
            
            <div class="booking-details">
                <strong>Booking Details:</strong><br>
                ID: 1<br>
                Facility: Badminton Court A<br>
                Date: 2026-06-15<br>
                Time: 10:00 - 12:00
            </div>
            
            <div class="btn-group">
                <form action="view-bookings.html" method="GET" style="flex: 1;">
                    <button type="submit" class="btn-delete">Yes, Cancel Booking</button>
                </form>
                <a href="view-bookings.html" class="btn-cancel">No, Go Back</a>
            </div>
            
            <br>
            <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
