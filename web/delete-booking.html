<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cancel Booking - E-Sukan</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 10px; text-align: center; }
        h1 { color: #f44336; }
        .warning { font-size: 50px; margin: 20px 0; }
        .booking-details { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 5px; margin: 20px 0; text-align: left; }
        .btn-delete { background: #f44336; color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-cancel { background: #666; color: white; padding: 10px 25px; text-decoration: none; border-radius: 5px; margin-left: 10px; }
        .btn-back { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Cancel Booking</h1>
        <div class="warning">⚠️</div>
        <p>Are you sure you want to cancel this booking?</p>
        
        <div class="booking-details">
            <strong>Booking Details:</strong><br>
            ID: 1<br>
            Facility: Badminton Court A<br>
            Date: 2024-06-15<br>
            Time: 10:00 - 12:00
        </div>
        
        <form action="#" method="post" style="display: inline;">
            <button type="submit" class="btn-delete">Yes, Cancel Booking</button>
        </form>
        <a href="view-bookings.html" class="btn-cancel">No, Go Back</a>
        
        <br>
        <a href="index.html" class="btn-back">← Back to Dashboard</a>
    </div>
</body>
</html>
